<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">
<title>IR Remote</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
input,textarea{user-select:text!important;-webkit-user-select:text!important}
body{background:#07090f;color:#d0e2f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* ── Top bar ── */
.bar{background:#0c1422;border-bottom:2px solid #00d4ff;padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:99;box-shadow:0 2px 20px rgba(0,212,255,.15)}
.bar-info{flex:1;min-width:0}
.bar-title{font-size:15px;font-weight:700;color:#00d4ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-sub{font-size:10px;color:#3a5870;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.back-btn{flex-shrink:0;background:transparent;border:1px solid #1c3048;color:#4a6a80;padding:6px 13px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;display:none}
.back-btn.show{display:block}
.back-btn:hover{border-color:#00d4ff;color:#00d4ff}
.conn-dot{width:9px;height:9px;border-radius:50%;background:#1a2e42;flex-shrink:0;transition:background .3s}
.conn-dot.ok{background:#00e87a;box-shadow:0 0 7px #00e87a}
.conn-dot.err{background:#ff4455;box-shadow:0 0 7px #ff4455}

/* ── Page / Cards ── */
.page{padding:14px;max-width:480px;margin:0 auto}
.card{background:#0d1825;border:1px solid #1a2e42;border-radius:12px;padding:15px;margin-bottom:12px}
.sec-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#2e4455;margin-bottom:10px;font-weight:700}
.irow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1a2e42;font-size:12px;gap:8px}
.irow:last-child{border:none}
.ival{color:#00d4ff;font-weight:700;text-align:right;font-size:11px}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:13px 16px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .18s;margin-bottom:8px;line-height:1.2}
.btn:last-child{margin-bottom:0}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.bc{background:#00d4ff;color:#000}.bc:hover{background:#7ef0ff}
.bg{background:#00e87a;color:#000}.bg:hover{background:#6effc0}
.bgh{background:transparent;border:1px solid #1a2e42;color:#5a7a90}
.bgh:hover{border-color:#00d4ff;color:#b0cce0}
.br{background:#ff4455;color:#fff}.br:hover{background:#ff8899}
.ba{background:#ffb020;color:#000}.ba:hover{background:#ffd060}
.bx{background:transparent;border:1px solid #ff4455;color:#ff4455}
.bx:hover{background:rgba(255,68,85,.1)}
.bbl{background:#1a3a8a;color:#7eb8ff;border:1px solid #2a5acc}
.bbl:hover{background:#2a4aaa;color:#b0d8ff}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0c1825;border:1px solid #00d4ff;color:#7ef0ff;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}

/* ── Landing ── */
.land-wrap{display:flex;flex-direction:column;align-items:center;padding:48px 20px 28px;gap:16px;text-align:center}
.land-icon{font-size:56px;line-height:1}
.land-title{font-size:20px;font-weight:700;color:#d0e2f0}
.land-sub{font-size:12px;color:#3a5870;line-height:1.8;max-width:280px}
.land-divider{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#2a3e50;margin:4px 0}
.conn-cards{display:flex;gap:12px;width:100%;max-width:320px}
.conn-card{flex:1;background:#0d1825;border:1px solid #1a2e42;border-radius:14px;padding:20px 12px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .2s}
.conn-card:hover{border-color:#00d4ff;background:#0c1e30}
.conn-card:active{transform:scale(.96)}
.conn-card.ble{border-color:#2a4acc}
.conn-card.ble:hover{border-color:#7eb8ff;background:#0c1435}
.conn-card-icon{font-size:34px;line-height:1}
.conn-card-title{font-size:13px;font-weight:700;color:#d0e2f0}
.conn-card-sub{font-size:10px;color:#3a5870;text-align:center;line-height:1.5}
.conn-note{font-size:10px;color:#2a3e50;line-height:1.7;background:#0d1825;border:1px solid #1a2e42;border-radius:8px;padding:10px 14px;max-width:320px;text-align:left;width:100%}
.conn-note b{color:#4a6a80}

/* ── Saved Configs ── */
.cfg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cfg-heading{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#2e4455;font-weight:700}
.cfg-add{width:40px;height:40px;border-radius:50%;background:#00d4ff;color:#000;border:none;font-size:24px;line-height:1;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.cfg-add:hover{background:#7ef0ff}
.cfg-add:active{transform:scale(.88)}
.cfg-empty{text-align:center;padding:40px 20px;color:#2e4455}
.cfg-empty-icon{font-size:44px;margin-bottom:14px}
.cfg-empty p{font-size:13px;line-height:1.9}
.cfg-item{background:#0d1825;border:1px solid #1a2e42;border-radius:12px;padding:13px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .18s}
.cfg-item:hover{border-color:#00d4ff}
.cfg-item:active{background:#0c1a28}
.cfg-item-body{flex:1;min-width:0}
.cfg-item-name{font-size:14px;font-weight:700;color:#d0e2f0;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cfg-item-meta{font-size:10px;color:#3a5870}
.cfg-item-actions{display:flex;gap:6px;flex-shrink:0}
.cfg-item-ren,.cfg-item-del{width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid #1e3048;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cfg-item-ren{color:#3a5870;font-size:13px}
.cfg-item-ren:hover{border-color:#00d4ff;color:#00d4ff}
.cfg-item-ren:active{background:#00d4ff;color:#000;transform:scale(.9)}
.cfg-item-del{color:#3a5870;font-size:14px}
.cfg-item-del:hover{border-color:#ff4455;color:#ff4455}
.cfg-item-del:active{background:#ff4455;color:#fff;transform:scale(.9)}

/* ── DB load banner ── */
.db-banner{background:#0a1520;border:1px solid #ffb020;border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.db-banner-text{flex:1;font-size:11px;color:#c08030;line-height:1.5}
.db-banner-btn{flex-shrink:0;padding:7px 13px;border-radius:6px;background:#ffb020;color:#000;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.db-banner-btn:active{transform:scale(.95)}

/* ── Brand search ── */
.search-box{position:relative;margin-bottom:10px}
.search-box input{width:100%;background:#0d1825;border:1px solid #1a2e42;border-radius:8px;color:#d0e2f0;padding:11px 14px 11px 40px;font-size:13px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#00d4ff}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:#2e4455;pointer-events:none}
.brand-count{font-size:10px;color:#2e4455;margin-bottom:8px;padding-left:2px}

/* ── Pattern nav ── */
.pat-nav{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.pat-nav .btn{margin:0;flex:1;padding:10px 8px}
.pat-ctr{flex:0 0 56px;text-align:center;font-size:13px;font-weight:700;color:#5a7a90;background:#0c1422;border:1px solid #1a2e42;border-radius:8px;padding:9px 4px}

/* ── Power test ── */
.pwr-wrap{text-align:center;padding:16px 0 6px}
.pwr-btn{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#200808,#140404);border:3px solid #ff4455;color:#ff4455;font-size:11px;font-weight:700;cursor:pointer;box-shadow:0 0 24px rgba(255,68,85,.25);transition:all .2s;display:inline-flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.pwr-btn:hover{box-shadow:0 0 44px rgba(255,68,85,.55)}
.pwr-btn:active{transform:scale(.93)}
.pwr-ico{font-size:32px;line-height:1}
.sel-hint{text-align:center;font-size:11px;color:#2e4455;margin:6px 0 10px}

/* ── Overlays ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(4,8,16,.82);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.ov-box{background:#0d1825;border:1px solid #00d4ff;border-radius:16px;padding:28px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 8px 48px rgba(0,212,255,.15)}
.ov-box h3{font-size:17px;font-weight:700;color:#d0e2f0;margin-bottom:8px}
.ov-box p{font-size:12px;color:#3a5870;margin-bottom:20px;line-height:1.6}
.ov-row{display:flex;gap:10px}
.ov-row .btn{flex:1;margin:0}
.ov-box.danger{border-color:#ff4455}

/* ── Save config ── */
.save-input{width:100%;background:#07090f;border:1px solid #1a2e42;border-radius:8px;color:#d0e2f0;padding:12px 14px;font-size:15px;outline:none;transition:border-color .2s;display:block}
.save-input:focus{border-color:#00d4ff}
.save-input::placeholder{color:#2e4455}
.save-actions{display:flex;gap:8px;margin-top:4px}
.save-actions .btn{flex:1;margin:0}

/* ── Physical button ── */
@keyframes physpress{0%{transform:scale(1)}30%{transform:scale(.88)}70%{transform:scale(.88)}100%{transform:scale(1)}}
@keyframes physglow{0%{box-shadow:0 0 18px rgba(255,68,85,.3)}40%{box-shadow:0 0 50px rgba(255,68,85,.9)}100%{box-shadow:0 0 18px rgba(255,68,85,.3)}}
.phys-press{animation:physpress .25s ease,physglow .25s ease}
.phys-ind{position:fixed;top:58px;right:14px;background:#0d1825;border:1px solid #ff4455;color:#ff8888;font-size:10px;font-weight:700;padding:5px 10px;border-radius:20px;z-index:150;opacity:0;transition:opacity .2s;pointer-events:none}
.phys-ind.show{opacity:1}

/* ── Remote ── */
.remote{max-width:300px;margin:0 auto;padding:4px 0 28px;display:flex;flex-direction:column;align-items:center}
.rm-pwr-row{margin-bottom:10px}
.rm-pwr-btn{width:68px;height:68px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#240a0a,#0a0404);border:3px solid #ff4455;color:#ff4455;font-size:28px;cursor:pointer;box-shadow:0 0 18px rgba(255,68,85,.3);transition:all .18s;display:inline-flex;align-items:center;justify-content:center}
.rm-pwr-btn:active{background:#ff4455;color:#fff;transform:scale(.88)}
.rm-quick{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.rm-q{padding:6px 11px;border-radius:20px;background:#0d1825;border:1px solid #1e3048;color:#4a6870;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.rm-q:active{background:#162030;color:#00d4ff;border-color:#00d4ff}
.rm-pairs{display:flex;justify-content:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.rm-pcol{display:flex;flex-direction:column;align-items:center;gap:5px}
.rm-plbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#2e4455;font-weight:700;margin-bottom:2px}
.rm-pb{width:58px;height:34px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.rm-pb:active{transform:scale(.91)}
.rm-pv{background:#0a1e10;border:1px solid rgba(0,232,122,.28);color:#00e87a}.rm-pv:active{background:#00e87a;color:#000}
.rm-pc{background:#04101e;border:1px solid rgba(79,195,247,.22);color:#4fc3f7}.rm-pc:active{background:#4fc3f7;color:#000}
.rm-pt{background:#130e00;border:1px solid rgba(255,176,32,.22);color:#ffb020}.rm-pt:active{background:#ffb020;color:#000}
.rm-pe{background:#0d1825;border:1px solid #1e3048;color:#3a5870;font-size:9px;letter-spacing:.04em}.rm-pe:active{background:#1a2e42;color:#d0e2f0}
.rm-dpad{display:grid;grid-template-columns:44px 44px 44px;grid-template-rows:44px 44px 44px;gap:3px;margin-bottom:14px}
.rm-dp{border-radius:10px;background:#0d1825;border:1px solid #1e3048;color:#6080a0;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.rm-dp:active{background:#1a3050;transform:scale(.9)}
.rm-ok{border-radius:50%;background:radial-gradient(circle,#0d2040,#060c18);border:2px solid #00d4ff;color:#00d4ff;font-size:11px;font-weight:800}
.rm-ok:active{background:#00d4ff;color:#000;transform:scale(.9)}
.rm-empty{}
.rm-numpad{display:grid;grid-template-columns:repeat(3,52px);gap:8px;margin-bottom:14px}
.rm-num{height:52px;border-radius:50%;background:#0d1825;border:1px solid #1a2e42;color:#8ab0d0;font-size:19px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.rm-num:active{background:#1a2e42;color:#00d4ff;transform:scale(.9)}
.rm-nph{height:52px}
.rm-misc-lbl{align-self:flex-start;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#2a3e50;font-weight:700;margin:4px 0;padding-left:2px}
.rm-misc{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%}
.rm-mb{padding:9px 4px;border-radius:8px;background:#0d1825;border:1px solid #1a2e42;color:#4a6a80;font-size:10px;font-weight:700;cursor:pointer;text-align:center;line-height:1.3;word-break:break-word;transition:all .15s}
.rm-mb:active{background:#162030;color:#d0e2f0}
</style>
</head>
<body>

<div class="bar">
  <button class="back-btn" id="backbtn" onclick="goBack()">&#8592; Back</button>
  <div class="bar-info">
    <div class="bar-title" id="btitle">IR Remote</div>
    <div class="bar-sub" id="bsub">Choose a connection method</div>
  </div>
  <div class="conn-dot" id="cdot"></div>
</div>

<div class="phys-ind" id="physind">&#9211; POWER</div>
<div class="page" id="app"></div>
<div class="toast" id="toast"></div>
<input type="file" id="db-picker" accept=".json" style="display:none" onchange="onDbFilePick(event)">

<!-- Power test confirm overlay -->
<div class="overlay" id="pwr-overlay">
  <div class="ov-box">
    <h3>Did the device respond?</h3>
    <p>Check whether the device reacted to the signal just sent.</p>
    <div class="ov-row">
      <button class="btn bg" onclick="doYes()">&#10003;&nbsp; Yes!</button>
      <button class="btn br" onclick="doNo()">&#10007;&nbsp; No</button>
    </div>
  </div>
</div>

<!-- Delete confirm overlay -->
<div class="overlay" id="del-overlay">
  <div class="ov-box danger">
    <h3>Delete configuration?</h3>
    <p id="del-name" style="font-weight:700;color:#d0e2f0;margin-bottom:6px"></p>
    <p>This cannot be undone.</p>
    <div class="ov-row">
      <button class="btn br" onclick="doDeleteConfirm()">&#10005;&nbsp; Delete</button>
      <button class="btn bgh" onclick="doDeleteCancel()">Cancel</button>
    </div>
  </div>
</div>

<!-- Rename overlay -->
<div class="overlay" id="ren-overlay">
  <div class="ov-box">
    <h3>Rename configuration</h3>
    <p style="margin-bottom:14px">Enter a new name below.</p>
    <input class="save-input" id="ren-input" type="text" maxlength="40" autocomplete="off"
      style="margin-bottom:16px">
    <div class="ov-row">
      <button class="btn bg" onclick="doRenameConfirm()">&#10003;&nbsp; Save</button>
      <button class="btn bgh" onclick="doRenameCancel()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── Block zoom ─────────────────────────────────────────────
document.addEventListener('wheel',function(e){if(e.ctrlKey)e.preventDefault();},{passive:false});
document.addEventListener('keydown',function(e){if(e.ctrlKey&&(e.key==='+'||e.key==='-'||e.key==='='||e.key==='0'))e.preventDefault();});
document.addEventListener('touchstart',function(e){if(e.touches.length>1)e.preventDefault();},{passive:false});
document.addEventListener('touchmove',function(e){if(e.touches.length>1)e.preventDefault();},{passive:false});
var _lt=0;
document.addEventListener('touchend',function(e){var n=Date.now();if(n-_lt<300)e.preventDefault();_lt=n;},{passive:false});

// ── Physical button ────────────────────────────────────────
window._physBtnAction=null;
function triggerPhysBtn(){
  var el=document.getElementById('physind');
  el.classList.add('show'); clearTimeout(el._t);
  el._t=setTimeout(function(){el.classList.remove('show');},900);
  var pw=document.querySelector('.rm-pwr-btn,.pwr-btn');
  if(pw){pw.classList.remove('phys-press');void pw.offsetWidth;pw.classList.add('phys-press');setTimeout(function(){pw.classList.remove('phys-press');},350);}
  if(typeof window._physBtnAction==='function') window._physBtnAction();
}

// ══════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════
var DB=null, NAV=[];
var CUR={brand:'',type:'',pattern:0,total:0};
window._pwrSig=null; window._remSigs=[];

// Connection type: null | 'usb' | 'ble'
var CONN=null;

// ── USB Serial state ───────────────────────────────────────
var _port=null,_writer=null,_reader=null,_usbConn=false,_rbuf='',_pending=null;

// ── BLE state ──────────────────────────────────────────────
var _bleDevice=null,_bleServer=null,_rxChar=null,_bleBuf='',_blePending=null;
var BLE_SVC='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
var BLE_RX ='6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // write
var BLE_TX ='6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // notify

// ══════════════════════════════════════════════════════════
// Utils
// ══════════════════════════════════════════════════════════
function toast(m,ok){
  var t=document.getElementById('toast');
  t.textContent=m; t.style.borderColor=ok?'#00e87a':'#ff4455'; t.style.color=ok?'#6effc0':'#ff8888';
  t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2400);
}
function bar(title,sub,back){
  document.getElementById('btitle').textContent=title;
  document.getElementById('bsub').textContent=sub||'';
  var b=document.getElementById('backbtn'); back?b.classList.add('show'):b.classList.remove('show');
}
function goBack(){if(NAV.length) NAV.pop()();}
function row(l,v){return '<div class="irow"><span>'+l+'</span><span class="ival">'+v+'</span></div>';}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function setDot(s){
  var d=document.getElementById('cdot');
  d.className='conn-dot'+(s==='ok'?' ok':s==='err'?' err':'');
  d.title=s==='ok'?'Connected':s==='err'?'Error':'Not connected';
}

// ══════════════════════════════════════════════════════════
// USB Serial
// ══════════════════════════════════════════════════════════
async function connectUsb(){
  if(!('serial' in navigator)){toast('Web Serial not supported. Use Chrome or Edge.',false);return false;}
  try{
    _port=await navigator.serial.requestPort();
    await _port.open({baudRate:115200});
    _usbConn=true; _writer=_port.writable.getWriter();
    CONN='usb'; setDot('ok'); bar('IR Remote','Connected · USB Serial',false);
    _usbReadLoop(); return true;
  }catch(e){setDot('err');toast('USB connection failed: '+e.message,false);return false;}
}
async function _usbReadLoop(){
  var dec=new TextDecoder();
  while(_usbConn&&_port&&_port.readable){
    try{
      _reader=_port.readable.getReader();
      while(true){
        var r=await _reader.read(); if(r.done) break;
        _rbuf+=dec.decode(r.value);
        var lines=_rbuf.split('\n'); _rbuf=lines.pop();
        for(var i=0;i<lines.length;i++){
          var ln=lines[i].trim(); if(!ln) continue;
          try{var ev=JSON.parse(ln);if(ev.event==='btn_power'){triggerPhysBtn();continue;}}catch(e){}
          if(_pending){var fn=_pending;_pending=null;fn(ln);}
        }
      }
    }catch(e){if(_usbConn)setDot('err');}
    finally{try{_reader.releaseLock();}catch(e){}}
    if(!_usbConn) break;
  }
}
async function _usbSend(obj){
  if(!_usbConn||!_writer){toast('ESP32 not connected',false);return{ok:false,err:'Not connected'};}
  try{
    await _writer.write(new TextEncoder().encode(JSON.stringify(obj)+'\n'));
    var resp=await Promise.race([
      new Promise(function(res){_pending=res;}),
      new Promise(function(res){setTimeout(function(){res('{"ok":false,"err":"timeout"}');},2000);})
    ]);
    _pending=null;
    try{return JSON.parse(resp);}catch(e){return{ok:false,err:'Parse error'};}
  }catch(e){return{ok:false,err:e.message};}
}

// ══════════════════════════════════════════════════════════
// BLE
// ══════════════════════════════════════════════════════════
function _handleBleLine(ln){
  ln=ln.trim(); if(!ln) return;
  try{var ev=JSON.parse(ln);if(ev.event==='btn_power'){triggerPhysBtn();return;}}catch(e){}
  if(_blePending){var fn=_blePending;_blePending=null;fn(ln);}
}
function _onBleNotify(event){
  _bleBuf+=new TextDecoder().decode(event.target.value);
  var lines=_bleBuf.split('\n'); _bleBuf=lines.pop();
  lines.forEach(function(l){_handleBleLine(l);});
}

async function connectBle(){
  if(!('bluetooth' in navigator)){toast('Web Bluetooth not supported. Use Chrome on Android.',false);return false;}
  try{
    _bleDevice=await navigator.bluetooth.requestDevice({
      filters:[{name:'IR-Remote'}],
      optionalServices:[BLE_SVC]
    });
    _bleDevice.addEventListener('gattserverdisconnected',function(){
      CONN=null; setDot(''); bar('IR Remote','Choose a connection method',false);
      toast('Bluetooth disconnected',false);
    });
    _bleServer=await _bleDevice.gatt.connect();
    var svc=await _bleServer.getPrimaryService(BLE_SVC);
    var txChar=await svc.getCharacteristic(BLE_TX); // notify
    _rxChar=await svc.getCharacteristic(BLE_RX);     // write
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged',_onBleNotify);
    CONN='ble'; setDot('ok'); bar('IR Remote','Connected · Bluetooth',false);
    return true;
  }catch(e){setDot('err');toast('BLE connection failed: '+e.message,false);return false;}
}

async function _bleSend(obj){
  if(!_rxChar){toast('ESP32 not connected',false);return{ok:false,err:'Not connected'};}
  var data=new TextEncoder().encode(JSON.stringify(obj)+'\n');
  var CHUNK=128;
  try{
    for(var i=0;i<data.length;i+=CHUNK){
      await _rxChar.writeValueWithoutResponse(data.slice(i,i+CHUNK));
      if(data.length>CHUNK) await new Promise(function(r){setTimeout(r,10);});
    }
    var resp=await Promise.race([
      new Promise(function(res){_blePending=res;}),
      new Promise(function(res){setTimeout(function(){res('{"ok":false,"err":"timeout"}');},3000);})
    ]);
    _blePending=null;
    try{return JSON.parse(resp);}catch(e){return{ok:false,err:'Parse error'};}
  }catch(e){return{ok:false,err:e.message};}
}

// ── Unified send ───────────────────────────────────────────
async function sendCmd(obj){
  if(CONN==='usb') return await _usbSend(obj);
  if(CONN==='ble') return await _bleSend(obj);
  toast('Not connected',false); return{ok:false,err:'Not connected'};
}

function showPower(brand,type,pattern){
  var devs=DB.devices.filter(function(d){return d.brand===brand&&d.category===type;});
  var total=devs.length;
  if(!total){toast('No data found',false);return;}
  if(pattern<0) pattern=0; if(pattern>=total) pattern=total-1;
  CUR.brand=brand;CUR.type=type;CUR.pattern=pattern;CUR.total=total;
  var key='types:'+brand;
  var lastIsTypes=NAV.length&&NAV[NAV.length-1]._k===key;
  if(!lastIsTypes){var fn=function(){showTypes(brand);};fn._k=key;NAV.push(fn);}
  bar('Test Pattern',brand+' · '+type,true);
  var dev=devs[pattern],ps=null;
  if(dev&&dev.signals){
    for(var i=0;i<dev.signals.length;i++){
      var sn=dev.signals[i].name.toUpperCase();
      if(sn==='POWER'||sn==='PWR'||sn.indexOf('POWER')>=0||sn.indexOf('STANDBY')>=0){ps=dev.signals[i];break;}
    }
    if(!ps&&dev.signals.length) ps=dev.signals[0];
  }
  window._pwrSig=ps; window._physBtnAction=doPower;
  var be=esc(brand),te=esc(type);
  var h='<div class="pat-nav">'
    +'<button class="btn ba" '+(pattern>0?'onclick="showPower(\''+be+'\',\''+te+'\','+(pattern-1)+')"':'disabled')+'>&#8592; Prev</button>'
    +'<div class="pat-ctr">'+(pattern+1)+'/'+total+'</div>'
    +'<button class="btn ba" '+(pattern<total-1?'onclick="showPower(\''+be+'\',\''+te+'\','+(pattern+1)+')"':'disabled')+'>Next &#8594;</button>'
    +'</div>';
  if(dev) h+='<div class="card"><div class="sec-label">Pattern '+(pattern+1)+' info</div>'
    +row('File',dev.source_file||'-')
    +row('Protocol',dev.protocols?dev.protocols.join(', '):'?')
    +row('Buttons',(dev.signals?dev.signals.length:0)+' signals')
    +'</div>';
  h+='<div class="pwr-wrap"><button class="pwr-btn" id="pwrbtn" onclick="doPower()" '+(ps?'':'disabled')+'>'
    +'<span class="pwr-ico">&#9211;</span><span>TEST POWER</span></button></div>'
    +'<p class="sel-hint">'+(ps?'Point at device and press to test':'No power signal in this pattern')+'</p>'
    +'<button class="btn bc" onclick="showSaveConfig(\''+be+'\',\''+te+'\','+pattern+')">&#9654;&nbsp; Select This Pattern</button>';
  document.getElementById('app').innerHTML=h;
}

// ══════════════════════════════════════════════════════════
// PAGE: Remote Control
// ══════════════════════════════════════════════════════════
function showRemote(brand,type,pattern,configName){
  var devs=DB.devices.filter(function(d){return d.brand===brand&&d.category===type;});
  var dev=devs[pattern];
  if(!dev){toast('Device not found',false);return;}
  NAV=[showConfigs];
  var barTitle=configName||(brand+' · '+type);
  var barSub=configName?(brand+' · '+type+' · Pattern '+(pattern+1)):('Pattern '+(pattern+1));
  bar(barTitle,barSub,true);
  var sigs=dev.signals||[];
  window._remSigs=sigs;

  function fi(pats){
    for(var i=0;i<sigs.length;i++){var u=sigs[i].name.toUpperCase().replace(/[-_ ]/g,'');for(var k=0;k<pats.length;k++)if(u===pats[k])return i;}
    for(var i=0;i<sigs.length;i++){var u=sigs[i].name.toUpperCase().replace(/[-_ ]/g,'');for(var k=0;k<pats.length;k++){var p=pats[k];if(p.length>=4&&u.indexOf(p)>=0)return i;}}
    return -1;
  }

  var iPwr=fi(['POWER','PWR','STANDBY','ONOFF','POWERTOGGLE']);
  window._physBtnAction=(function(idx){return function(){if(idx>=0)clickBtn(idx);};})(iPwr);

  var iVu=fi(['VOLUP','VOLUMEUP','VOL+','VOLUME+']),   iVd=fi(['VOLDOWN','VOLDN','VOLUMEDOWN','VOL-','VOLUME-']);
  var iMu=fi(['MUTE','MUTETOGGLE']);
  var iCu=fi(['CHUP','CH+','CHANNELUP','CHANNEL+','PROGUP','PROG+','PAGEUP']),
      iCd=fi(['CHDOWN','CHDN','CH-','CHANNELDOWN','CHANNEL-','PROGDOWN','PROG-','PAGEDOWN']);
  var iTu=fi(['TEMPUP','TEMP+','TEMPERATUREUP','WARMER','HEATUP','HEAT+']),
      iTd=fi(['TEMPDOWN','TEMP-','TEMPERATUREDOWN','COOLER','HEATDOWN','HEAT-']);
  var iUp=fi(['UP','ARROWUP','DPADUP','CURSORUP']),   iDn=fi(['DOWN','ARROWDOWN','DPADDOWN','CURSORDOWN']);
  var iLt=fi(['LEFT','ARROWLEFT','DPADLEFT','CURSORLEFT']), iRt=fi(['RIGHT','ARROWRIGHT','DPADRIGHT','CURSORRIGHT']);
  var iOk=fi(['OK','ENTER','SELECT','CONFIRM','CENTER','DPADCENTER']);
  var iMenu=fi(['MENU','SETTINGS','SETUP']),iHome=fi(['HOME','HOMESCREEN']);
  var iBk=fi(['BACK','RETURN','EXIT','GOBACK']),iInfo=fi(['INFO','DISPLAY','STATUS']),iGui=fi(['GUIDE','EPG']);
  var nums=[]; for(var n=0;n<=9;n++) nums.push(fi([String(n),'NUM'+n,'KEY'+n,'DIGIT'+n,'NUMBER'+n]));

  var used={};
  [iPwr,iVu,iVd,iMu,iCu,iCd,iTu,iTd,iUp,iDn,iLt,iRt,iOk,iMenu,iHome,iBk,iInfo,iGui]
    .forEach(function(x){if(x>=0)used[x]=1;});
  nums.forEach(function(x){if(x>=0)used[x]=1;});
  var misc=[]; sigs.forEach(function(s,i){if(!used[i])misc.push(i);});

  function rb(idx,cls,lbl){
    if(idx<0)return'';
    var s=sigs[idx],l=lbl||(s.name.length>8?s.name.slice(0,7)+'…':s.name);
    return'<button class="'+cls+'" onclick="clickBtn('+idx+')" title="'+s.name+'">'+l+'</button>';
  }
  function dp(idx,lbl,cls){
    cls=cls||'rm-dp';
    if(idx>=0)return'<button class="'+cls+'" onclick="clickBtn('+idx+')" title="'+sigs[idx].name+'">'+lbl+'</button>';
    return'<div class="rm-empty"></div>';
  }

  var h='<div class="remote">';
  if(iPwr>=0) h+='<div class="rm-pwr-row">'+rb(iPwr,'rm-pwr-btn','&#9211;')+'</div>';

  var qRow=[[iMenu,'MENU'],[iHome,'HOME'],[iBk,'BACK'],[iInfo,'INFO'],[iGui,'GUIDE']].filter(function(x){return x[0]>=0;});
  if(qRow.length){h+='<div class="rm-quick">';qRow.forEach(function(x){h+=rb(x[0],'rm-q',x[1]);});h+='</div>';}

  var pCols=[];
  if(iVu>=0||iVd>=0||iMu>=0) pCols.push({lbl:'VOL',u:iVu,d:iVd,ex:iMu,exl:'MUTE',c:'rm-pv'});
  if(iCu>=0||iCd>=0)          pCols.push({lbl:'CH', u:iCu,d:iCd,ex:-1, exl:'',   c:'rm-pc'});
  if(iTu>=0||iTd>=0)          pCols.push({lbl:'TEMP',u:iTu,d:iTd,ex:-1,exl:'',   c:'rm-pt'});
  if(pCols.length){
    h+='<div class="rm-pairs">';
    pCols.forEach(function(p){
      h+='<div class="rm-pcol"><div class="rm-plbl">'+p.lbl+'</div>';
      if(p.u>=0)h+=rb(p.u,'rm-pb '+p.c,'+');
      if(p.d>=0)h+=rb(p.d,'rm-pb '+p.c,'−');
      if(p.ex>=0)h+=rb(p.ex,'rm-pb rm-pe',p.exl);
      h+='</div>';
    });
    h+='</div>';
  }

  if(iUp>=0||iDn>=0||iLt>=0||iRt>=0||iOk>=0){
    h+='<div class="rm-dpad">';
    h+='<div class="rm-empty"></div>'+dp(iUp,'&#9650;')+'<div class="rm-empty"></div>';
    h+=dp(iLt,'&#9664;')+dp(iOk,'OK','rm-dp rm-ok')+dp(iRt,'&#9654;');
    h+='<div class="rm-empty"></div>'+dp(iDn,'&#9660;')+'<div class="rm-empty"></div>';
    h+='</div>';
  }

  if(nums.some(function(x){return x>=0;})){
    h+='<div class="rm-numpad">';
    [1,2,3,4,5,6,7,8,9,-1,0,-1].forEach(function(n){
      if(n===-1){h+='<div class="rm-nph"></div>';return;}
      var idx=nums[n];
      if(idx>=0)h+='<button class="rm-num" onclick="clickBtn('+idx+')">'+n+'</button>';
      else h+='<div class="rm-nph"></div>';
    });
    h+='</div>';
  }

  if(misc.length){
    h+='<div class="rm-misc-lbl">Other</div><div class="rm-misc">';
    misc.forEach(function(i){
      var l=sigs[i].name.length>9?sigs[i].name.slice(0,8)+'…':sigs[i].name;
      h+='<button class="rm-mb" onclick="clickBtn('+i+')" title="'+sigs[i].name+'">'+l+'</button>';
    });
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

function clickBtn(i){sendSignal(window._remSigs[i]);}

// ══════════════════════════════════════════════════════════
// Send IR signal
// ══════════════════════════════════════════════════════════
function parseVal(dec,hex,raw){
  if(dec!==null&&dec!==undefined&&!isNaN(dec))return(dec>>>0);
  if(hex&&typeof hex==='string'){var v=parseInt(hex,16);if(!isNaN(v))return(v>>>0);}
  if(raw&&typeof raw==='string'){var v2=parseInt(raw,16);if(!isNaN(v2))return(v2>>>0);var v3=parseInt(raw);if(!isNaN(v3))return(v3>>>0);}
  return 0;
}
async function sendSignal(sig){
  if(!sig) return false;
  var p;
  if(sig.raw_timings_us&&sig.raw_timings_us.length>0){
    p={proto:'RAW',raw:sig.raw_timings_us,freq:sig.frequency_hz||38000};
  }else{
    p={proto:(sig.protocol||'NEC').replace(/\{\d+\}/,'').trim().toUpperCase(),
       addr:parseVal(sig.address_decimal,sig.address_hex,sig.address_raw),
       cmd:parseVal(sig.command_decimal,sig.command_hex,sig.command_raw),
       freq:sig.frequency_hz||38000,
       bits:sig.signal_structure?(sig.signal_structure.bits||32):32};
  }
  var j=await sendCmd(p);
  toast(j.ok?('OK: '+sig.name):('Failed: '+(j.err||'Error')),j.ok);
  return j.ok;
}
